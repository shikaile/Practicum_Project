<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourtVision Gate Entry</title>
    <style>
        /* Premium Dark Gate Entry Palette with Court Background Overlay */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0d0f12;
            background-image: linear-gradient(rgba(13, 15, 18, 0.9), rgba(13, 15, 18, 0.95)), 
                              url('https://images.unsplash.com/photo-1544698310-74ea9d1c8258?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #f0f2f5;
        }

        /* Central Login Wrapper Module */
        .login-card {
            background-color: rgba(22, 26, 34, 0.95);
            border: 1px solid #283141;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(6px);
        }

        .login-card h1 {
            color: #ffffff;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 8px;
        }

        .login-card h1 span {
            color: #ff6600;
        }

        .login-card p {
            color: #9aa5b5;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Form Controls and Label Structure */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ff6600;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #0d0f12;
            border: 1px solid #283141;
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff6600;
            box-shadow: 0 0 8px rgba(255, 102, 0, 0.2);
        }

        /* Submit Sign-In Actions */
        .submit-btn {
            width: 100%;
            background-color: #ff6600;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s ease-in-out;
        }

        .submit-btn:hover {
            background-color: #e65c00;
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.4);
        }

        /* Dynamic System Validation Error Text Block */
        #error-message-block {
            background-color: rgba(255, 51, 51, 0.1);
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>COURT<span>VISION</span></h1>
        <p>Analytics Dashboard Gate Entry</p>

        <!-- Error Feedback Anchor -->
        <div id="error-message-block"></div>

        <!-- Login Interactive Submission Form -->
        <form id="gate-entry-form" onsubmit="executeGateValidation(event)">
            <div class="form-group">
                <label for="username-field">Coach Username</label>
                <input type="text" id="username-field" placeholder="Enter credential ID..." required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password-field">Security Password</label>
                <input type="password" id="password-field" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="submit-btn">Secure Login</button>
        </form>
    </div>

    <script>
        function executeGateValidation(event) {
            event.preventDefault(); // Halt standard browser query reloads

            const usernameInput = document.getElementById("username-field").value.trim();
            const passwordInput = document.getElementById("password-field").value.trim();

            // 1. Approved Multi-User Authentication Mapping Dictionary
            const validCoaches = {
                "coachmary": "courtvision2026",
                "coachtest1": "courtvision2026",
                "coachtest2": "courtvision2026",
                "coachtest3": "courtvision2026",
                "coachtest4": "courtvision2026"
            };

            // 2. Validate credentials against user mapping
            if (validCoaches[usernameInput] && validCoaches[usernameInput] === passwordInput) {
                // Save unique tester namespace to establish secure session boundaries
                sessionStorage.setItem("coachName", usernameInput);
                
                // Route safely to the visual analytics panel
                window.location.href = "dashboard.html";
            } else {
                // Trigger structural validation failure message block
                const errorBlock = document.getElementById("error-message-block");
                errorBlock.style.display = "block";
                errorBlock.innerText = "❌ Invalid username or password";
            }
        }

        // Clean out any stale residual security state bounds on initial entry mapping
        window.addEventListener("DOMContentLoaded", () => {
            sessionStorage.clear();
        });
    </script>
</body>
</html>
